<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripWay - Contato</title>

    <link rel="stylesheet" href="../css/contato.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <a href="../index.html" class="logo">
            <img src="../images/tripway.png" alt="Logo TripWay">
        </a>

        <ul class="nav-links">
            <li><a href="../index.html" class="nav-link">Home</a></li>
            <li><a href="destinos.html" class="nav-link">Destinos</a></li>
            <li><a href="pacotes.html" class="nav-link">Pacotes</a></li>
            <li><a href="contato.html" class="nav-link" id="nav-active">Contato</a></li>
        </ul>
    </nav>

    <header>
        <h1>Contato e Reserva</h1>
        <img src="../images/reserva.png" alt="Reserva de viagem" height="500" width="1100">

        <p>
            Entre em contato e garanta sua próxima viagem com praticidade,
            segurança e atendimento personalizado. ✈️🌍
        </p>
    </header>

    <main>
        <section>

            <h2>Formulário de Contato</h2>

            <form>
                <div>
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Ex: Maria de Lourdes" required>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Ex: email@gmail.com" required>
                </div>

                <div>
                    <label for="destination">Destino de interesse</label>

                    <select id="destination">
                        <option value="barcelona">Barcelona</option>
                        <option value="franca">França</option>
                        <option value="okinawa">Okinawa</option>
                    </select>
                </div>

                <div>
                    <label for="date">Data</label>
                    <input type="date" id="date" required>
                </div>

                <div>
                    <label for="amount">Quantidade de pessoas</label>
                    <input type="number" id="amount" placeholder="Ex: 5" required>
                </div>

                <div>
                    <label for="message">Mensagem</label>
                    <input type="text" id="message" placeholder="Ex: Amo Barcelona" required>
                </div>

                <button type="submit">Enviar</button>
            </form>

        </section>

        <a href="../index.html" class="btn-back">Voltar</a>
    </main>

    <footer>
        <p>© 2026 TripWay — Todos os direitos reservados</p>
        <p>Contato: contato@tripway.com</p>
    </footer>

</body>
</html>
