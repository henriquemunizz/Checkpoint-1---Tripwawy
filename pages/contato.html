<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body style="font-family: Poppins;">

    <nav>    
        <a href="../home.html">
            <p>Home</p>
        </a>

        <ul>
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="servicos.html">Pacotes ou Serviços</a></li>
            <li><a href="contato.html">Contato e reserva</a></li>
        </ul>
    </nav>

    <header>
        <img src="../images/reserva.png" alt="" height="500" width="1100">
        <h1>Contato e Reserva</h1>
        <p>Entre em contato e garanta sua próxima viagem com praticidade, segurança e atendimento personalizado. ✈️🌍</p>
    </header>


    <main>
        <section>

            <h2>Formulário de Contato</h2>
            
            <form>
                <div>
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Ex: Maria de Lourdes" required/>
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Ex: email@gmail.com" required/>
                </div>

                <div>
                    <label for="destination">Destino de interesse</label>
                    <select id="destination">
                        <option value="barcelona">Barcelona</option>
                        <option value="franca">França</option>
                        <option value="okinawa">Okinawa</option>
                    </select>
                </div>

                <div>
                    <label for="date">Data</label>
                    <input type="date" id="date" required/>
                </div>

                <div>
                    <label for="amount">Quantidade de pessoas</label>
                    <input type="number" id="amount" placeholder="Ex: 5" required/>
                </div>

                <div>
                    <label for="message">Mensagem</label>
                    <input type="text" id="message" placeholder="Ex: Amo Barcelona" required/>
                </div>
                <button type="submit">Enviar</button>
            </form>

        </section>
        
        <a href="../home.html">Voltar</a>
    </main>
</body>

</html>
